apiVersion: kubolt.io/v1
apps:
  - name: caddy
    chartPath: ./apps/caddy
    namespace: caddy
  - name: registry
    chartPath: ./apps/registry
    namespace: registry
  - name: walls
    chartPath: ./apps/walls
    namespace: walls
    dependsOn:
      - caddy
      - registry
    backup:
      pvcs:
        - walls-postgres-data
