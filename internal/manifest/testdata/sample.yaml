apiVersion: kubolt.io/v1
apps:
  - name: caddy
    chartPath: ./apps/caddy
    namespace: caddy
  - name: walls
    chartPath: ./apps/walls
    namespace: walls
    dependsOn:
      - caddy
    backup:
      targets:
        - type: filesystem
          pvc: walls-postgres-data
      scaleDeployments: true
